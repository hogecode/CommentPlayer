definitions:
  dto.ApiComment:
    properties:
      author:
        description: コメント投稿者ID（匿名の場合はnil）
        type: string
      color:
        description: コメント色（16進数カラーコード）
        type: string
      size:
        description: コメントサイズ
        enum:
        - big
        - medium
        - small
        type: string
      text:
        description: コメント本文
        type: string
      time:
        description: コメント表示時刻（秒）
        minimum: 0
        type: number
      type:
        description: コメント位置
        enum:
        - right
        - top
        - bottom
        type: string
    required:
    - color
    - size
    - text
    - time
    - type
    type: object
  dto.CaptureListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/entity.Capture'
        type: array
      pagination:
        $ref: '#/definitions/dto.Pagination'
    type: object
  dto.ClientSettingsDTO:
    properties:
      close_comment_form_after_sending:
        type: boolean
      comment_font_size:
        type: integer
      comment_speed_rate:
        description: コメント設定
        type: number
      default_comment_color:
        type: string
      last_synced_at:
        description: Unix timestamp (ms)
        type: integer
      max_comments_display_count:
        type: integer
      mute_abusive_discriminatory_prejudiced_comments:
        type: boolean
      mute_big_size_comments:
        type: boolean
      mute_colored_comments:
        type: boolean
      mute_comment_keywords_normalize_alphanumeric_width_case:
        type: boolean
      mute_consecutive_same_characters_comments:
        type: boolean
      mute_fixed_comments:
        description: コメントNG設定
        type: boolean
      mute_vulgar_comments:
        type: boolean
      muted_comment_keywords:
        items:
          $ref: '#/definitions/dto.MutedCommentKeyword'
        type: array
      muted_niconico_user_ids:
        items:
          type: string
        type: array
      mylist:
        description: マイリスト情報
        items:
          $ref: '#/definitions/dto.MylistItem'
        type: array
      sync_settings:
        description: 設定の同期
        type: boolean
      video_watched_history_max_count:
        description: 動画履歴
        type: integer
      watched_history:
        description: 動画視聴履歴
        items:
          $ref: '#/definitions/dto.WatchedHistoryItem'
        type: array
    type: object
  dto.ErrorResponse:
    properties:
      code:
        type: string
      error:
        type: string
    type: object
  dto.FolderActionResponse:
    properties:
      data:
        $ref: '#/definitions/dto.FolderResponse'
      message:
        type: string
      success:
        type: boolean
    type: object
  dto.FolderListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.FolderResponse'
        type: array
    type: object
  dto.FolderRequest:
    properties:
      path:
        type: string
    required:
    - path
    type: object
  dto.FolderResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_watched:
        type: boolean
      path:
        type: string
      updated_at:
        type: string
    type: object
  dto.MutedCommentKeyword:
    properties:
      match:
        description: partial, forward, backward, exact, regex
        type: string
      pattern:
        type: string
    type: object
  dto.MylistItem:
    properties:
      created_at:
        description: Unix timestamp (ms)
        type: integer
      id:
        type: integer
    type: object
  dto.Pagination:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.SeriesListResponse:
    properties:
      series:
        items:
          $ref: '#/definitions/dto.SeriesResponse'
        type: array
      total:
        type: integer
    type: object
  dto.SeriesResponse:
    properties:
      comment: {}
      created_at:
        type: string
      first_end_month:
        type: integer
      first_end_year:
        type: integer
      first_month:
        type: integer
      first_year:
        type: integer
      id:
        type: integer
      series_name_file:
        type: string
      subtitles: {}
      syobocal_title_id:
        type: integer
      syobocal_title_name:
        type: string
      syobocal_title_name_en:
        type: string
      updated_at:
        type: string
    type: object
  dto.SeriesWithVideosResponse:
    properties:
      series:
        $ref: '#/definitions/dto.SeriesResponse'
      videos:
        items:
          $ref: '#/definitions/dto.VideoResponse'
        type: array
    type: object
  dto.SuccessResponse:
    properties:
      message:
        type: string
    type: object
  dto.SyobocalErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  dto.SyobocalSaveTitleRequest:
    properties:
      series_id:
        description: シリーズID
        type: integer
      tid:
        description: Syobocal TID (Title ID)
        type: string
      title:
        description: タイトル名
        type: string
    required:
    - series_id
    - tid
    - title
    type: object
  dto.SyobocalSaveTitleResponse:
    properties:
      message:
        type: string
      series_id:
        type: integer
      success:
        type: boolean
    type: object
  dto.SyobocalTitleResponse:
    properties:
      comment:
        description: コメント
        type: string
      first_end_month:
        description: 最終放送月
        type: integer
      first_end_year:
        description: 最終放送年
        type: integer
      first_month:
        description: 初回放送月
        type: string
      first_year:
        description: 初回放送年
        type: string
      short_title:
        description: 短いタイトル
        type: string
      tid:
        description: Title ID
        type: string
      title:
        description: タイトル名
        type: string
      title_en:
        description: 英語タイトル
        type: string
    type: object
  dto.SyobocalTitleSearchResponse:
    properties:
      titles:
        items:
          $ref: '#/definitions/dto.SyobocalTitleResponse'
        type: array
      total:
        type: integer
    type: object
  dto.ThumbnailRegenerateRequest:
    properties:
      height:
        minimum: 1
        type: integer
      timestamp:
        minimum: 0
        type: number
      width:
        minimum: 1
        type: integer
    type: object
  dto.ThumbnailRegenerateResponse:
    properties:
      id:
        type: integer
      message:
        type: string
      thumbnail_info:
        $ref: '#/definitions/entity.ThumbnailInfo'
    type: object
  dto.UserAccessToken:
    properties:
      access_token:
        type: string
      token_type:
        type: string
    type: object
  dto.UserAccessTokenRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.UserCreateRequest:
    properties:
      confirm_password:
        minLength: 1
        type: string
      password:
        minLength: 1
        type: string
      username:
        minLength: 1
        type: string
    required:
    - confirm_password
    - password
    - username
    type: object
  dto.VideoListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/entity.Video'
        type: array
      pagination:
        $ref: '#/definitions/dto.Pagination'
    type: object
  dto.VideoResponse:
    properties:
      channel_id:
        description: Syobocal チャンネルID（ChID）
        type: integer
      comments:
        items:
          $ref: '#/definitions/dto.ApiComment'
        type: array
      created_at:
        type: string
      description:
        type: string
      duration:
        type: number
      episode:
        description: エピソード番号
        type: integer
      file_name:
        type: string
      file_size:
        type: integer
      folder_id:
        description: Folderテーブルへの外部キー
        type: integer
      id:
        type: integer
      is_deleted:
        type: boolean
      jikkyo_comment_count:
        type: integer
      jikkyo_date:
        type: string
      liked:
        type: boolean
      prog_end_time:
        description: 放送終了時刻
        type: string
      prog_start_time:
        description: 放送開始時刻
        type: string
      screenshot_file_path:
        type: string
      series_id:
        description: Seriesテーブルへの外部キー
        type: integer
      src:
        type: string
      status:
        description: ready, processing, error
        type: string
      subtitle:
        description: エピソードサブタイトル
        type: string
      thumbnail_info:
        $ref: '#/definitions/entity.ThumbnailInfo'
      updated_at:
        type: string
      views:
        type: integer
    type: object
  dto.VideoYearsResponse:
    properties:
      data:
        items:
          type: integer
        type: array
    type: object
  dto.WatchedHistoryItem:
    properties:
      created_at:
        type: integer
      jikkyo_comment_offset:
        type: integer
      last_playback_position:
        description: ミリ秒
        type: number
      updated_at:
        type: integer
      video_id:
        type: integer
    type: object
  entity.Capture:
    properties:
      _:
        type: string
      created_at:
        type: string
      filename:
        type: string
      id:
        type: integer
      video_id:
        type: integer
    type: object
  entity.ThumbnailInfo:
    properties:
      generated_at:
        type: string
      height:
        type: integer
      width:
        type: integer
    type: object
  entity.User:
    properties:
      client_settings:
        additionalProperties: true
        type: object
      created_at:
        type: string
      id:
        type: integer
      is_admin:
        type: integer
      name:
        type: string
      niconico_user_id:
        type: integer
      niconico_user_name:
        type: string
      niconico_user_premium:
        type: integer
      updated_at:
        type: string
    type: object
  entity.Video:
    properties:
      channel_id:
        description: Syobocal チャンネルID（ChID）
        type: integer
      created_at:
        type: string
      description:
        type: string
      duration:
        type: number
      episode:
        description: エピソード番号
        type: integer
      file_name:
        type: string
      file_size:
        type: integer
      folder_id:
        description: Folderテーブルへの外部キー
        type: integer
      id:
        type: integer
      is_deleted:
        type: boolean
      jikkyo_comment_count:
        type: integer
      jikkyo_date:
        type: string
      liked:
        type: boolean
      prog_end_time:
        description: 放送終了時刻
        type: string
      prog_start_time:
        description: 放送開始時刻
        type: string
      screenshot_file_path:
        type: string
      series_id:
        description: Seriesテーブルへの外部キー
        type: integer
      status:
        description: ready, processing, error
        type: string
      subtitle:
        description: エピソードサブタイトル
        type: string
      thumbnail_info:
        $ref: '#/definitions/entity.ThumbnailInfo'
      updated_at:
        type: string
      views:
        type: integer
    type: object
  gin.H:
    additionalProperties: {}
    type: object
host: 100.72.160.115
info:
  contact: {}
  description: ビデオ管理アプリケーションのREST API
  title: commentPlayer API
  version: 1.0.0
paths:
  /api/v1/captures:
    get:
      description: キャプチャ一覧をページネーション付きで取得します
      parameters:
      - description: ビデオID（フィルタリング用）
        in: query
        name: video_id
        type: integer
      - default: 1
        description: ページ番号
        in: query
        name: page
        type: integer
      - default: 20
        description: 1ページあたりのアイテム数
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CaptureListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: キャプチャ一覧を取得
      tags:
      - Captures
    post:
      description: 新しいキャプチャを作成します
      parameters:
      - description: キャプチャファイル
        in: formData
        name: file
        required: true
        type: file
      - description: ビデオID
        in: formData
        name: video_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/entity.Capture'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: キャプチャを作成
      tags:
      - Captures
  /api/v1/captures/{id}:
    delete:
      description: キャプチャをファイルシステムとDBから削除します
      parameters:
      - description: キャプチャID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: キャプチャを削除
      tags:
      - Captures
    get:
      description: キャプチャをIDで取得します
      parameters:
      - description: キャプチャID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Capture'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: キャプチャを取得
      tags:
      - Captures
  /api/v1/files/{folderID}/{filepath}:
    get:
      description: 指定されたフォルダ内のファイルを取得します
      parameters:
      - description: フォルダID
        in: path
        name: folderID
        required: true
        type: integer
      - description: ファイルパス
        in: path
        name: filepath
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: フォルダ内のファイルを取得
      tags:
      - Static Files
  /api/v1/folders:
    get:
      description: 監視対象フォルダの一覧を取得します
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.FolderListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 監視対象フォルダ一覧を取得
      tags:
      - Folders
    post:
      description: 新しいフォルダを監視対象に追加します
      parameters:
      - description: フォルダパス
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.FolderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.FolderActionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 監視対象フォルダを追加
      tags:
      - Folders
  /api/v1/folders/{id}:
    delete:
      description: フォルダを監視対象から削除します（ソフトデリート）
      parameters:
      - description: フォルダID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.FolderActionResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: 監視対象フォルダを削除
      tags:
      - Folders
  /api/v1/series:
    get:
      description: 全てのシリーズの一覧を取得します
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SeriesListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      summary: シリーズ一覧を取得
      tags:
      - Series
  /api/v1/series/{id}:
    get:
      description: 指定されたシリーズIDに関連する全てのビデオを取得します
      parameters:
      - description: シリーズID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SeriesWithVideosResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      summary: シリーズとそのビデオを取得
      tags:
      - Series
  /api/v1/series/resync:
    post:
      description: 全てのビデオをシリーズと再同期します。ファイル名パターンからシリーズを抽出し、ビデオに割り当てます。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin.H'
      summary: すべてのビデオをシリーズと同期
      tags:
      - Series
  /api/v1/settings/client:
    get:
      description: ログイン中のユーザーアカウントのクライアント設定を取得する
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ClientSettingsDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - Bearer: []
      summary: クライアント設定取得 API
      tags:
      - Settings
    put:
      description: ログイン中のユーザーアカウントのクライアント設定を更新する
      parameters:
      - description: 更新するクライアント設定のデータ
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ClientSettingsDTO'
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - Bearer: []
      summary: クライアント設定更新 API
      tags:
      - Settings
  /api/v1/syobocal:
    get:
      description: 指定されたタイトルを Syobocal から検索し、複数候補を返す
      parameters:
      - description: 検索するタイトル
        in: query
        name: title
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SyobocalTitleSearchResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.SyobocalErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.SyobocalErrorResponse'
      summary: Syobocal からタイトル候補を検索
      tags:
      - Syobocal
    post:
      consumes:
      - application/json
      description: TID、タイトル名、シリーズIDを受け取り、Syobocal API から詳細情報を取得してシリーズを更新
      parameters:
      - description: 保存するタイトル情報（tid, title, series_id）
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SyobocalSaveTitleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SyobocalSaveTitleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.SyobocalErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.SyobocalErrorResponse'
      summary: Syobocal タイトル情報を Series に更新
      tags:
      - Syobocal
  /api/v1/users:
    post:
      description: 新しいユーザーアカウントを作成します
      parameters:
      - description: ユーザー作成リクエスト
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UserCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/entity.User'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: ユーザーアカウント作成
      tags:
      - Users
  /api/v1/users/token:
    post:
      description: ユーザーの認証情報を検証し、JWT トークンを発行します
      parameters:
      - description: ユーザー名とパスワード
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UserAccessTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:

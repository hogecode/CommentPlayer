version: '3.8'

services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    environment:
      - GOPATH=/go
      - GOPROXY=https://proxy.golang.org,direct
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    ports:
      - "3000:3000"    # Vite React Dev Server
      - "7001:7001"    # Caddy HTTPS
      - "8000:8000"    # API Server (Go)
    networks:
      - commeplayer
    stdin_open: true
    tty: true
    command: /bin/bash

networks:
  commeplayer:
    driver: bridge


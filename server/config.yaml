# CommentVideo サーバー設定

# 環境の種類 (development, staging, production, testing)
environment: "development"

# サーバー設定
server:
  host: "0.0.0.0"
  port: 8000

# データベース設定
db:
  dsn: "app.db"
  max_open_conns: 10
  max_idle_conns: 5
  log_level: "silent"

# ログ設定
log:
  level: "debug"
  format: "json"
  use_color: true

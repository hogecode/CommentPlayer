<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="200" height="200" fill="url(#bgGradient)" rx="20"/>
  
  <rect x="20" y="20" width="160" height="160" fill="none" stroke="#16a34a" stroke-width="2" rx="10" opacity="0.3"/>
  
  <g filter="url(#glow)">
    <rect x="25" y="45" width="85" height="28" fill="#ef4444" rx="6"/>
    <polygon points="110,55 115,55 110,65" fill="#ef4444"/>
    <text x="35" y="65" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">wwwwwww</text>
  </g>
  
  <g filter="url(#glow)" opacity="0.85">
    <rect x="70" y="80" width="95" height="28" fill="#3b82f6" rx="6"/>
    <polygon points="165,90 170,90 165,100" fill="#3b82f6"/>
    <text x="80" y="100" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">キター！</text>
  </g>
  
  <g filter="url(#glow)" opacity="0.7">
    <rect x="40" y="115" width="90" height="28" fill="#eab308" rx="6"/>
    <polygon points="130,125 135,125 130,135" fill="#eab308"/>
    <text x="50" y="135" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" font-weight="bold">あああああ</text>
  </g>
  
  <path d="M 160 70 Q 170 70 170 80" stroke="#16a34a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 160 105 Q 170 105 170 115" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  
  <circle cx="180" cy="30" r="8" fill="#16a34a" opacity="0.3"/>
  <circle cx="20" cy="170" r="8" fill="#16a34a" opacity="0.3"/>
  
  <polygon points="175,100 180,95 180,105" fill="#16a34a" opacity="0.4"/>
</svg>